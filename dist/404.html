<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found - Masked Banana</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <style media="screen">
    body {
      background: #09090b;
      color: #f4f4f5;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #message {
      background: #18181b;
      border: 1px solid #27272a;
      max-width: 400px;
      width: 90%;
      margin: 0 auto;
      padding: 40px 32px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      display: block;
    }

    #message h2 {
      color: #eab308;
      font-weight: 800;
      font-size: 48px;
      margin: 0 0 12px;
    }

    #message h1 {
      font-size: 24px;
      font-weight: 600;
      color: #e4e4e7;
      margin: 0 0 16px;
    }

    #message p {
      line-height: 1.6;
      margin: 16px 0 32px;
      font-size: 15px;
      color: #a1a1aa;
    }

    #message a {
      display: inline-block;
      background: #eab308;
      text-decoration: none;
      color: #09090b;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: background 0.2s;
    }

    #message a:hover {
      background: #ca8a04;
    }
  </style>
</head>

<body>
  <div id="message">
    <img src="/favicon.png" alt="Masked Banana" class="logo" />
    <h2>404</h2>
    <h1>Page Not Found</h1>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>

</html>
